[project]
name = "workgraph-schemas"
version = "0.1.0"
description = "Shared Pydantic schemas for WorkGraph AI (ApiError, domain DTOs)."
requires-python = ">=3.11,<3.13"
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workgraph_schemas"]
