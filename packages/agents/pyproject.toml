[project]
name = "workgraph-agents"
version = "0.1.0"
description = "LLM prompt runners with schema-validated output (wired in Phase 3+)."
requires-python = ">=3.11,<3.13"
dependencies = [
    "openai>=1.55",
    "pydantic>=2.8",
    "pydantic-settings>=2.6",
    "pyyaml>=6.0",
    "workgraph-observability",
    "workgraph-schemas",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/workgraph_agents"]
# prompts/ lives inside the package tree so it ships automatically.
