# WorkGraph AI — single-origin nginx config.
# The browser sees one origin. / goes to the Next.js server. /api, /ws go to
# the FastAPI server. This keeps session cookies simple and sidesteps CORS.
#
# Replace `workgraph.example.com` with your actual domain before deploy.
# The certbot service writes fullchain.pem + privkey.pem into /etc/nginx/certs.

upstream workgraph_api {
    server api:8000;
    keepalive 32;
}

upstream workgraph_web {
    server web:3000;
    keepalive 32;
}

# Port 80 — ACME challenge + redirect to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name workgraph.example.com;

    # Let's Encrypt webroot challenges.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name workgraph.example.com;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1h;

    # Security headers — HSTS, frame-deny. CSP is intentionally loose for
    # now (React Flow ships inline styles); tighten once Phase 11 lands.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    client_max_body_size 2m;

    # ---- WebSocket: /ws/* --------------------------------------------------
    location /ws/ {
        proxy_pass http://workgraph_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ---- SSE: /api/events/stream ------------------------------------------
    # Must disable buffering, keep the connection open indefinitely. The
    # upstream already emits `X-Accel-Buffering: no`, we honor it here.
    location = /api/events/stream {
        proxy_pass http://workgraph_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # ---- REST API: /api/* -------------------------------------------------
    location /api/ {
        proxy_pass http://workgraph_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ---- Next.js: everything else -----------------------------------------
    location / {
        proxy_pass http://workgraph_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }
}
