; Alembic config for workgraph-api.
;
; Migrations run OUT-OF-PROCESS from the async FastAPI app -- invoked by
; `alembic upgrade head` before the api container starts. Each migration
; file uses SQLAlchemy's sync engine, so the async driver prefix is
; stripped from the URL in env.py.
;
; URL is NOT set here. env.py pulls WORKGRAPH_DATABASE_URL (matching the
; FastAPI settings key) so dev + prod share one source of truth.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
timezone = UTC

; Leave sqlalchemy.url empty -- env.py resolves at runtime from the
; environment, supporting both sqlite (dev) and postgres (prod) without
; editing this file.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
