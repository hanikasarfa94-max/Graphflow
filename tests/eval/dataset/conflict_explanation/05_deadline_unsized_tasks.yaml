      - {id: "t-etl", title: "Set up ETL pipeline", estimate_hours: 24, assignee_role: "data", deliverable_id: "d-dash"}
      - {id: "t-api", title: "Dashboard query API", estimate_hours: 16, assignee_role: "backend", deliverable_id: "d-dash"}
      - {id: "t-charts", title: "Chart components", estimate_hours: 16, assignee_role: "frontend", deliverable_id: "d-dash"}
